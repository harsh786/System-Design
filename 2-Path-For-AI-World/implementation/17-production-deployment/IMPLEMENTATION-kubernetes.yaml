---
# =============================================================================
# PROMETHEUS RULES (Alerting)
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-platform-alerts
  namespace: ai-production
  labels:
    release: prometheus
spec:
  groups:
  - name: ai-platform.rules
    rules:
    - alert: HighErrorRate
      expr: |
        rate(http_requests_total{namespace="ai-production",status=~"5.."}[5m])
        / rate(http_requests_total{namespace="ai-production"}[5m]) > 0.05
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate on {{ $labels.app }}"
    - alert: HighLatency
      expr: |
        histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{namespace="ai-production"}[5m])) > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "P95 latency > 10s on {{ $labels.app }}"
    - alert: GuardrailHighTriggerRate
      expr: |
        rate(guardrail_blocks_total{namespace="ai-production"}[15m])
        / rate(guardrail_checks_total{namespace="ai-production"}[15m]) > 0.1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Guardrail blocking >10% of responses"
    - alert: QdrantDiskUsageHigh
      expr: |
        qdrant_storage_used_bytes / qdrant_storage_total_bytes > 0.8
      for: 30m
      labels:
        severity: warning
      annotations:
        summary: "Qdrant disk usage > 80%"
    - alert: LLMProviderErrors
      expr: |
        rate(llm_provider_errors_total[5m]) > 5
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "LLM provider errors elevated - check fallback"

---
# =============================================================================
# CANARY DEPLOYMENT (for progressive rollout)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator-canary
  namespace: ai-production
  labels:
    app: agent-orchestrator
    track: canary
    version: v2.4.0-rc1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-orchestrator
      track: canary
  template:
    metadata:
      labels:
        app: agent-orchestrator
        track: canary
        version: v2.4.0-rc1
    spec:
      serviceAccountName: agent-orchestrator-sa
      containers:
      - name: agent-orchestrator
        image: registry.company.com/ai-platform/agent-orchestrator:v2.4.0-rc1
        ports:
        - containerPort: 8080
        env:
        - name: CANARY
          value: "true"
        - name: CONFIG_PATH
          value: "/config/config.yaml"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-provider-keys
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-provider-keys
              key: ANTHROPIC_API_KEY
        - name: POSTGRES_URL
          valueFrom:
            secretKeyRef:
              name: infra-secrets
              key: POSTGRES_URL
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          periodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: app-config
      - name: prompts
        configMap:
          name: prompt-configs

---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator-canary
  namespace: ai-production
spec:
  selector:
    app: agent-orchestrator
    track: canary
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
