apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-orchestrator-monitor
  namespace: ai-production
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: agent-orchestrator
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: retrieval-service-monitor
  namespace: ai-production
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: retrieval-service
  endpoints:
  - port: http
    path: /metrics
    interval: 15s

---
apiVersion: monitoring.coreos.com/v1
